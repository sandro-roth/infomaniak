# Host specifics
root_group: wheel

# Wireguard specifics
wireguard_enabled: true

wireguard_role: client
wireguard_interface: wg0
wireguard_client_address: "10.8.0.2/24"
wireguard_server_public_key: "{{ hostvars['infomaniak']['wireguard_public_key_value'] }}"
wireguard_endpoint: "{{ hostvars['infomaniak']['ansible_host'] }}:51820"

wireguard_allowed_ips:
  - "10.8.0.0/24"

wireguard_persistent_keepalive: 25