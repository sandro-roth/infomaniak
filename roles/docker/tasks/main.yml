- name: Install Docker packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: "{{ docker_packages_state }}"
  notify: restart docker
  ignore_errors: "{{ ansible_check_mode }}"
  when: "ansible_version.full is version_compare('2.12', '<') or ansible_facts['os_family'] not in ['Debian']"

- name: Install docker-compose-plugin
  ansible.builtin.package:
    name: "{{ docker_compose_package }}"
    state: "{{ docker_compose_package_state }}"
  notify: restart docker
  ignore_errors: "{{ ansible_check_mode }}"
  when: docker_install_compose_plugin | bool and (ansible_version.full is version_compare('2.12', '<') or ansible_facts['os_family'] not in ['Debian'])