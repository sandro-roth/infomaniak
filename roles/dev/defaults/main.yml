dev_dir: /opt/dev

dev_bind_ip: "10.8.0.1"

jupyter_enabled: true
jupyter_port: 8888
jupyter_image: quay.io/jupyter/scipy-notebook:latest
jupyter_token: "{{ lookup('password', 'credentials/jupyter_token chars=ascii_letters,digits length=32') }}"

grafana_enabled: true
grafana_port: 3000
grafana_admin_user: admin
grafana_admin_password: "{{ lookup('password', 'credentials/grafana_admin_password length=32 chars=ascii_letters,digits') }}"

prometheus_port: 9090
node_exporter_port: 9100
cadvisor_port: 8080