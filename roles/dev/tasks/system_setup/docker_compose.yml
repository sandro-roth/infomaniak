- name: dev | write docker compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dev_dir }}/docker-compose.yml"
    owner: root
    group: "{{ root_group | default('root') }}"
    mode: "0644"

- name: dev | start stack
  community.docker.docker_compose_v2:
    project_src: "{{ dev_dir }}"
    state: present