- include_vars: "{{ ansible_facts.os_family }}.yml"
  tags: always

- block:

  - import_tasks: system_setup/timezone.yml
  - import_tasks: system_setup/locale.yml
  - import_tasks: system_setup/hostname.yml
  - import_tasks: system_setup/sysctl.yml
  - import_tasks: system_setup/microcode.yml
  - import_tasks: system_setup/fwupd.yml
    when: install_fwupd | bool
  - import_tasks: system_setup/cron.yml
  - import_tasks: system_setup/logging.yml
  - import_tasks: system_setup/backup.yml
  - import_tasks: system_setup/node_exporter.yml
    when: install_node_exporter | bool

  - name: software | apt | update cache
    ansible.builtin.apt:
      update_cache: true
      cache_valid_time: 7200

  - import_tasks: software/common_packages.yml
  - import_tasks: software/packages_git.yml
  - import_tasks: software/packages_cleanup.yml
  - import_tasks: software/packages_utilities.yml
  - import_tasks: software/fail2ban.yml
  - import_tasks: software/apparmor.yml
  - import_tasks: software/needrestart.yml

  when: ansible_facts.os_family in ['Debian']
  become: true