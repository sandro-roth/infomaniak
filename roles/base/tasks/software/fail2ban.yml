- name: software | fail2ban | Install
  tags: software, fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: software | fail2ban | Copy custom jail file
  tags: software, fail2ban
  ansible.builtin.template:
    src: "{{ security_fail2ban_custom_configuration_template }}"
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: reload_fail2ban