---
- name: update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: validate sshd config
  listen: reload_sshd
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false

- name: reload sshd
  listen: reload_sshd
  ansible.builtin.systemd:
    name: "{{ openssh_service | default('ssh') }}"
    state: reloaded