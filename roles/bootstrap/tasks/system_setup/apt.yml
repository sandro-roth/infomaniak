- name: system setup | apt | Fix APT sources
  tags: apt
  ansible.builtin.template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  when:
    - ansible_facts["distribution"] in ["Debian", "Ubuntu"]
  notify: update apt cache

- name: system setup | apt | Update cache
  tags: apt
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 7200
  when:
    - ansible_facts["distribution"] in ["Debian", "Ubuntu"]