- name: system setup | apt | Ensure APT directory state is clean
  tags: apt
  file:
    path: /etc/apt/sources.list.d
    state: directory
    mode: '0755'

- name: system setup | apt | Remove cloud-init APT sources
  tags: apt
  file:
    path: /etc/apt/sources.list.d/ubuntu.sources
    state: absent

- name: system setup | apt | Remove default sources.list backup
  tags: apt
  file:
    path: /etc/apt/sourcesllist
    state: absent

- name: system setup | apt | Fix APT sources
  tags: apt
  ansible.builtin.template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'

- name: system setup | apt | Disable cloud-init apt override
  tags: apt
  copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-apt-config.cfg
    content: |
      apt_preserve_sources_list: true

- name: system setup | apt | Network hardening for APT
  tags: apt
  copy:
    dest: /etc/apt/apt.conf.d/99-network-hardening
    content: |
      Acquire::ForceIPv4 "true";
      Acuire::Retries "2";
      Acquire::http::Timeout "10";
      Acquire::https::Timeout "10";

- name: system setup | apt | Update cache
  tags: apt
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 7200

- name: system setup | apt | upgrade packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: 7200

- name: software | apt | check reboot required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: software | apt | show reboot required
  ansible.builtin.debug:
    msg: "Reboot required"
  when:
    - reboot_required_file.stat.exists