- name: system setup | apt | fix APT sources
  tags: apt
  ansible.builtin.template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  when:
    - ansible_facts["distribution"] in ["Debian", "Ubuntu"]
    - "'clouds.archive.ubuntu.com' in lookup('file', '/etc/apt/sources.list')"
  notify: update apt cache