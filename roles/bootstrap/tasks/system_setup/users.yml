- name: system setup | users | create group
  tags: users, groups
  ansible.builtin.group:
    name: "{{ usr_group }}"
    state: present

- name: system setup | users | create admin user
  tags: users, admin
  ansible.builtin.user:
    name: "{{ main_usr }}"
    group: "{{ usr_group }}"
    groups: "{{ admin_group }}"
    state: present
    password: "{{ usr_pwd }}"
    comment: "Admin user created by Ansible"
    home: "{{ usr_home }}"
    create_home: true
    shell: /bin/bash

- name: system setup | users | add sudoers from template
  tags: users, sudoers
  ansible.builtin.template:
    src: sudoers.j2
    dest: /etc/sudoers.d/{{ main_usr }}
    owner: root
    group: root
    mode: '0440'

- name: system setup | users | create .ssh directory
  tags: users, ssh
  ansible.builtin.file:
    path: "{{ usr_home }}/.ssh"
    state: directory
    owner: "{{ main_usr }}"
    group: "{{ usr_group }}"
    mode: '0700'

- name: system setup | users | add public key to authorized_keys
  tags: users, ssh
  ansible.builtin.authorized_key:
    user: "{{ main_usr }}"
    state: present
    key: "{{ lookup('ansible.builtin.file', item) }}"
  loop:
    - ssh/ansible.pub

- name: system setup | users | create config directories
  tags: users, config
  ansible.builtin.file:
    path: "{{ usr_home }}/{{ item.dir }}"
    state: directory
    owner: "{{ main_usr }}"
    group: "{{ usr_group }}"
    mode: 0700
  loop:
    - { dir: '.bash' }
    - { dir: '.config' }
    - { dir: '.config/htop' }
    - { dir: '.config/mc' }
    - { dir: '.tmux' }
    - { dir: '.tmux/config' }
    - { dir: '.tmux/plugins' }
    - { dir: '.vim' }
    - { dir: '.vim/autoload' }
    - { dir: '.vim/bundle' }
    - { dir: '.vim/colors' }
    - { dir: '.vim/ftplugin' }
    - { dir: '.zsh' }
