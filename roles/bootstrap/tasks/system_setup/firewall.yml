# Basic setup of the firewall with ufw.
- name: system setup | firewall | install ufw
  tags: firewall
  ansible.builtin.apt:
    name: ufw
    state: present

- name: system setup | firewall | configure ipv6
  tags: firewall
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6={{ ipv6_firewall_enabled | ternary("yes", "no") }}'

- name: system setup | firewall | collect service facts
  tags: firewall
  ansible.builtin.service_facts:

- name: system setup | firewall | remember docker state
  tags: firewall
  ansible.builtin.set_fact:
    docker_was_running: >-
      {{
        'docker.service' in ansible_facts.services
        and ansible_facts.services['docker.service'].state == 'running'
      }}

- name: system setup | firewall | stop docker before firewall reset
  tags: firewall
  ansible.builtin.systemd:
    name: docker
    state: stopped
  when:
    - firewall_reset | default(false)
    - docker_was_running

- name: system setup | firewall | reset ufw
  tags: firewall
  community.general.ufw:
    state: reset
  when: firewall_reset | default(true)

- name: system setup | firewall | start docker after firewall reset
  tags: firewall
  ansible.builtin.systemd:
    name: docker
    state: started
  when:
    - firewall_reset | default(false)
    - docker_was_running

- name: system setup | firewall | default deny incoming
  tags: firewall
  community.general.ufw:
    policy: deny
    direction: incoming

- name: system setup | firewall | default allow outgoing
  tags: firewall
  community.general.ufw:
    policy: allow
    direction: outgoing

- name: system setup | firewall | enable logging
  tags: firewall
  community.general.ufw:
    logging: "on"

- name: system setup | firewall | allow and rate limit ssh
  tags: firewall
  community.general.ufw:
    rule: limit
    port: "{{ security_ssh_port }}"
    proto: tcp

- name: system setup | firewall | enable
  tags: firewall
  community.general.ufw:
    state: enabled

- name: system setup | firewall | wait for ssh
  tags: firewall
  ansible.builtin.wait_for:
    port: "{{ security_ssh_port }}"
    host: "{{ ansible_host | default(inventory_hostname) }}"
    timeout: 30
  delegate_to: localhost
  become: false

# --------------------------------------------------------------------------
# PORTS CONFIGURATION
# --------------------------------------------------------------------------

- name: system setup | wireguard | allow wireguard port
  tags: firewall
  community.general.ufw:
    rule: allow
    port: "{{ wireguard_port | default(51820)}}"
    proto: udp
  when:
    - wireguard_enabled | bool
    - wireguard_role == "server"