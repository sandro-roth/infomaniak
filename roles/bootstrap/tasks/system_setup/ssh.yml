# sshd hardening configuration
- name: system setup | ssh | OpenSSH install or update
  tags: ssh, hardening
  ansible.builtin.package:
    name: "{{ openssh_package }}"
    state: latest
  notify: restart_sshd

- name: system setup | ssh | Ensure ssh config directory exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: system setup | ssh | Ensure sshd config file exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    state: touch
    owner: root
    group: root
    mode: '0600'
  
