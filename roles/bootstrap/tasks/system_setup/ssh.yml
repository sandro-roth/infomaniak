# sshd hardening configuration
- name: system setup | ssh | OpenSSH install or update
  tags: ssh, hardening
  ansible.builtin.package:
    name: "{{ openssh_package }}"
    state: latest
  notify: restart_sshd

- name: system setup | ssh | Ensure ssh config directory exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: system setup | ssh | Ensure sshd config file exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    state: touch
    owner: root
    group: root
    mode: '0600'
  
- name: system setup | ssh | sshd hardening configuration
  tags: ssh, hardening
  blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED BLOCK - DO NOT EDIT"
    validate: /usr/sbin/sshd -t -f %s
    block: |
      Port {{ security_ssh_port }}
      PasswordAuthentication {{ security_ssh_password_authentication | ternary('yes', 'no') }}
      PermitRootLogin {{ security_ssh_permit_root_login | ternary('yes', 'no') }}
      UseDNS {{ security_ssh_use_dns | ternary('yes', 'no') }}
      PermitEmptyPasswords {{ security_ssh_permit_empty_passwords | ternary('yes', 'no') }}
      KbdInteractiveAuthentication {{ security_ssh_challenge_response_auth | ternary('yes', 'no') }}
      GSSAPIAuthentication {{ security_ssh_gssapi_authentication | ternary('yes', 'no') }}
      X11Forwarding {{ security_ssh_x11_forwarding | ternary('yes', 'no') }}
      AllowUsers {{ security_ssh_allowed_users | join(' ') }}
  notify: restart_sshd