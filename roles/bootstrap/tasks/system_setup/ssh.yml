# sshd hardening configuration
- name: system setup | ssh | OpenSSH install or update
  tags: ssh, hardening
  ansible.builtin.package:
    name: "{{ openssh_package }}"
    state: latest
  notify: reload_sshd

- name: system setup | ssh | Ensure ssh config directory exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: system setup | ssh | Ensure sshd config.d directory exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: system setup | ssh | Ensure sshd config file exists
  tags: ssh, hardening
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    state: touch
    owner: root
    group: root
    mode: '0600'
  
- name: system setup | ssh | sshd hardening configuration
  tags: ssh, hardening
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
    owner: root
    group: root
    mode: '0644'
    validate: /usr/sbin/sshd -t -f %s
  notify: reload_sshd