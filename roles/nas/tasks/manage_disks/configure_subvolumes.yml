- name: manage_disks | subvolumes | ensure temporary root mount point exists
  ansible.builtin.file:
    path: /mnt/btrfs-root
    state: directory
    mode: "0770"

- name: manage_disks | subvolumes | ensure temporary disk mount points exist
  ansible.builtin.file:
    path: "/mnt/btrfs-root/{{ item | basename }}"
    state: directory
    mode: "0770"
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"

- name: manage_disks | subvolumes | unmount existing temporary mounts
  ansible.posix.mount:
    path: "/mnt/btrfs-root/{{ item | basename }}"
    state: unmounted
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"
  failed_when: false
  changed_when: false

- name: manage_disks | subvolumes | mount data disks temporarily
  ansible.posix.mount:
    path: "/mnt/btrfs-root/{{ item | basename }}"
    src: "{{ item }}"
    fstype: btrfs
    state: ephemeral
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"

- name: manage_disks | subvolumes | check whether data subvolume exists
  ansible.builtin.command: >
    btrfs subvolume show /mnt/btrfs-root/{{ item | basename }}/data
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"
  register: btrfs_data_subvolume_check
  changed_when: false
  failed_when: false

- name: manage_disks | subvolumes | create data subvolume
  ansible.builtin.command: >
    btrfs subvolume create /mnt/btrfs-root/{{ item.item | basename }}/data
  loop: "{{ btrfs_data_subvolume_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc != 0

- name: manage_disks | subvolumes | unmount temporary data disk mounts
  ansible.posix.mount:
    path: "/mnt/btrfs-root/{{ item | basename }}"
    state: unmounted
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"

- name: manage_disks | subvolumes | remove temporary disk mount points
  ansible.builtin.file:
    path: "/mnt/btrfs-root/{{ item | basename }}"
    state: absent
  loop: "{{ data_disks }}"
  loop_control:
    label: "{{ item }}"