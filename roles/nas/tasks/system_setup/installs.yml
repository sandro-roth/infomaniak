---
- name: Nas | system setup | mergerfs
  when: ansible_facts.pkg_mgr == 'apt'
  block:

    - name: Set default update state
      ansible.builtin.set_fact:
        mergerfs_update_needed: false

    - name: Check installed mergerfs version
      ansible.builtin.command: mergerfs --version
      register: mergerfs_installed
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Get latest mergerfs release from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/trapexit/mergerfs/releases/latest
        return_content: true
      register: mergerfs_release
      check_mode: false

    - name: Set mergerfs version facts
      ansible.builtin.set_fact:
        mergerfs_latest_version: >-
          {{ mergerfs_release.json.tag_name | regex_replace('^v', '') }}
        mergerfs_installed_version: >-
          {{
            mergerfs_installed.stdout.split()[1]
            | regex_replace('^v', '')
            if mergerfs_installed.rc == 0
            else '0'
          }}

    - name: Determine whether mergerfs update is required
      ansible.builtin.set_fact:
        mergerfs_update_needed: >-
          {{ mergerfs_latest_version != mergerfs_installed_version }}

    - name: Show mergerfs version status
      ansible.builtin.debug:
        msg:
          - "Installed version: {{ mergerfs_installed_version }}"
          - "Latest version: {{ mergerfs_latest_version }}"
          - "Update required: {{ mergerfs_update_needed }}"

    - name: Install or update mergerfs
      when: mergerfs_update_needed
      block:

        - name: Ensure xz-utils is installed
          ansible.builtin.apt:
            name: xz-utils
            state: present
            update_cache: true

        - name: Install latest mergerfs package
          ansible.builtin.apt:
            deb: >-
              https://github.com/trapexit/mergerfs/releases/download/{{
                mergerfs_latest_version
              }}/{{ mergerfs_pkg_prefix }}{{
                mergerfs_latest_version
              }}{{ mergerfs_pkg_suffix }}
            state: present

# ----------------------------------------------------------------------------------------------------------------
# ----------------------------------------  SNAPRAID INSTALLATION ------------------------------------------------
# ----------------------------------------------------------------------------------------------------------------

- name: Nas | system setup | SnapRAID
  when: ansible_facts.pkg_mgr == 'apt'
  block:

    - name: Set default update state
      ansible.builtin.set_fact:
        snapraid_update_needed: false

    - name: Check installed SnapRAID version
      ansible.builtin.command: snapraid --version
      register: snapraid_installed
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Get latest SnapRAID release from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/amadvance/snapraid/releases/latest
        return_content: true
      register: snapraid_release
      check_mode: false

    - name: Set SnapRAID version facts
      ansible.builtin.set_fact:
        snapraid_latest_version: >-
          {{ snapraid_release.json.tag_name | regex_replace('^v', '') }}
        snapraid_installed_version: >-
          {{
            (
              snapraid_installed.stdout
              | default('')
              | regex_search('SnapRAID CLI v([0-9]+(?:\\.[0-9]+)*)', '\\1')
              | default(['0'], true)
            )
            | first
          }}

    - name: Determine whether SnapRAID update is required
      ansible.builtin.set_fact:
        snapraid_update_needed: >-
          {{ snapraid_latest_version is version(snapraid_installed_version, '>') }}

    - name: Show SnapRAID version status
      ansible.builtin.debug:
        msg:
          - "Installed version: {{ snapraid_installed_version }}"
          - "Latest version: {{ snapraid_latest_version }}"
          - "Update required: {{ snapraid_update_needed }}"

    - name: Install or update SnapRAID
      when: snapraid_update_needed
      block:

        - name: Install SnapRAID build dependencies
          ansible.builtin.apt:
            name:
              - build-essential
              - libz-dev
            state: present
            update_cache: true

        - name: Extract SnapRAID source archive
          ansible.builtin.unarchive:
            src: >-
              https://github.com/amadvance/snapraid/releases/download/v{{
                snapraid_latest_version
              }}/snapraid-{{ snapraid_latest_version }}.tar.gz
            dest: /tmp/
            remote_src: true
          notify: Cleanup SnapRAID download

        - name: Configure SnapRAID build
          ansible.builtin.command:
            cmd: ./configure
            chdir: "/tmp/snapraid-{{ snapraid_latest_version }}"
          changed_when: true

        - name: Compile SnapRAID
          ansible.builtin.command:
            cmd: make
            chdir: "/tmp/snapraid-{{ snapraid_latest_version }}"
          changed_when: true

        - name: Install SnapRAID
          ansible.builtin.command:
            cmd: make install
            chdir: "/tmp/snapraid-{{ snapraid_latest_version }}"
          changed_when: true

# ----------------------------------------------------------------------------------------------------------------
# -----------------------------------------  BTRFS INSTALLATION --------------------------------------------------
# ----------------------------------------------------------------------------------------------------------------

- name: Nas | system setup | btrfs-progs
  when: ansible_facts.pkg_mgr == 'apt'
  block:

    - name: Set default update state
      ansible.builtin.set_fact:
        btrfs_update_needed: false

    - name: Check installed btrfs-progs version
      ansible.builtin.command: btrfs --version
      register: btrfs_installed
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Get latest btrfs-progs release from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/kdave/btrfs-progs/releases/latest
        return_content: true
      register: btrfs_release
      check_mode: false

    - name: Set btrfs-progs version facts
      ansible.builtin.set_fact:
        btrfs_latest_version: >-
          {{ btrfs_release.json.tag_name | regex_replace('^v', '') }}
        btrfs_installed_version: >-
          {{
            btrfs_installed.stdout.split()[1]
            | regex_replace('^v', '')
            if btrfs_installed.rc == 0
            else '0'
          }}

    - name: Determine whether btrfs-progs update is required
      ansible.builtin.set_fact:
        btrfs_update_needed: >-
          {{
            btrfs_latest_version
            is version(btrfs_installed_version, '>')
          }}

    - name: Show btrfs-progs version status
      ansible.builtin.debug:
        msg:
          - "Installed version: {{ btrfs_installed_version }}"
          - "Latest version: {{ btrfs_latest_version }}"
          - "Update required: {{ btrfs_update_needed }}"

    - name: Include btrfs-progs installation tasks
      ansible.builtin.include_tasks:
        file: btrfs.yml
      when: btrfs_update_needed