- name: mergerfs | media_noncached | ensure media noncached mountpoint exists
  ansible.builtin.file:
    path: "{{ media_noncached }}"
    state: directory
    owner: "{{ nas_user }}"
    group: "{{ media_admin_group }}"
    mode: "0770"

- name: mergerfs | media_noncached | deploy systemd service
  ansible.builtin.template:
    src: mergerfs.mount.media_noncached.j2
    dest: /etc/systemd/system/mergerfs-media-noncached.service
    mode: "0644"
    force: true
  notify:
    - Reload systemd daemon
    - Restart mergerfs_media_noncached

- name: mergerfs | media_noncached | ensure service is enabled and running
  ansible.builtin.systemd:
    name: mergerfs-media-noncached.service
    enabled: true
    state: started
  when: not ansible_check_mode