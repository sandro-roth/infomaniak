- name: Cleanup SnapRAID download
  ansible.builtin.file:
    path: /tmp/snapraid-{{ snapraid_latest_version }}
    state: absent

- name: Cleanup cloned repository
  ansible.builtin.file:
    path: /tmp/btrfs-progs
    state: absent

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart mergerfs_media_cache
  ansible.builtin.systemd:
    name: mergerfs-media-cache.service
    enabled: true
    state: restarted

- name: Restart mergerfs_media_cold
  ansible.builtin.systemd:
    name: mergerfs-media-cold.service
    enabled: true
    state: restarted

- name: Restart mergerfs_cache_disks
  ansible.builtin.systemd:
    name: mergerfs-cache-disks.service
    enabled: true
    state: restarted

- name: Restart mergerfs_media_noncached
  ansible.builtin.systemd:
    name: mergerfs-media-noncached.service
    enabled: true
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart snapraid-btrfs-runner timer
  ansible.builtin.systemd:
    name: snapraid-btrfs-runner.timer
    state: restarted