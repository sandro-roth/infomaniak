- name: wireguard | install packages
  tags: wireguard
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true
  when:
    - wireguard_enabled | bool
    - ansible_facts['distribution'] in ['Ubuntu', 'Debian']

- name: wireguard | ensure config directory exists
  tags: wireguard
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: "{{ root_group }}"
    mode: "0700"
  when: wireguard_enabled | bool

- name: wireguard | install packages on MacOS #Assure homebrew is installed already!
  community.general.homebrew:
    name: wireguard-tools
    state: present
  when:
    - wireguard_enabled | bool
    - ansible_facts['os.family'] == 'Darwin'