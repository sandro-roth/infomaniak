# Bootstrap playbook
- hosts: all
  tags: always
  become: true
  gather_facts: true

  roles:
    - bootstrap

  pre_tasks:
    - name: pre-run | Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 7200
      when: ansible_facts["distribution"] in ["Debian", "Ubuntu"]

# roles
