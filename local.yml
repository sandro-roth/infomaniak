# Initialize client machine with Ansible
- hosts: all
  gather_facts: true

  roles:
    - role: bootstrap
      tags: bootstrap

    - role: base
      tags: base

- hosts: infomaniak
  gather_facts: true
  become: true

  roles:
    - role: docker
      tags: docker
    - role: wireguard
      tags: wireguard

- hosts: macbook
  gather_facts: true
  become: true

  roles:
    - role: wireguard
      tags: wireguard